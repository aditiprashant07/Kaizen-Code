name: CI Pipeline

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main ]

jobs:

  # -----------------------------
  # 🔹 JavaScript Linting
  # -----------------------------
  lint-js:
    name: Lint JS (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Node.js
        uses: actions/setup-node@v4  # ✅ updated
        with:
          node-version: 18

      - name: Run ESLint (only if files exist)
        run: |
          if [ -d "extension" ] && [ "$(ls -A extension 2>/dev/null)" ]; then
            cd extension
            npm install
            npx eslint .
          else
            echo "No JS files found, skipping ESLint"
          fi

  # -----------------------------
  # 🔹 Python Linting
  # -----------------------------
  lint-python:
    name: Lint Python (Pylint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Python
        uses: actions/setup-python@v5   # ✅ FIXED + updated
        with:
          python-version: "3.10"

      - name: Run Pylint (only if files exist)
        run: |
          if [ -d "api" ] && [ "$(ls -A api 2>/dev/null)" ]; then
            cd api
            pip install pylint
            pylint .
          else
            echo "No Python files found, skipping Pylint"
          fi

  # -----------------------------
  # 🔹 Python Tests
  # -----------------------------
  test-python:
    name: Run Python Tests
    runs-on: ubuntu-latest
    needs: lint-python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Tests (only if present)
        run: |
          if [ -d "api" ] && [ "$(ls -A api 2>/dev/null)" ]; then
            cd api
            pip install pytest
            pytest
          else
            echo "No tests found, skipping"
          fi