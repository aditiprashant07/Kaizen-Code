name: CI Pipeline

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main ]

jobs:

  # -----------------------------
  # 🔹 JavaScript Linting
  # -----------------------------
  lint-js:
    name: Lint JS (ESLint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          if [ -d "extension" ] && [ "$(ls -A extension 2>/dev/null)" ]; then
            npx eslint .
          else
            echo "No JS files found, skipping ESLint"
          fi

  # -----------------------------
  # 🔹 Python Linting
  # -----------------------------
  lint-python:
    name: Lint Python (Pylint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Run Pylint
        run: |
          if [ -d "api" ] && [ "$(ls -A api 2>/dev/null)" ]; then
            pylint .
          else
            echo "No Python files found, skipping Pylint"
          fi

  # -----------------------------
  # 🔹 Python Tests (Optional but recommended)
  # -----------------------------
  test-python:
    name: Run Python Tests
    runs-on: ubuntu-latest
    needs: lint-python   # ensures lint passes first

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          if [ -d "api" ] && [ "$(ls -A api 2>/dev/null)" ]; then
            pytest
          else
            echo "No tests found, skipping"
          fi